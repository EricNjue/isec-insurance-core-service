spring:
  application:
    name: motor-insurance-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/isec_insurance_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  flyway:
    enabled: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:admin}
    password: ${RABBITMQ_PASS:admin}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          max-interval: 10000ms
          multiplier: 2.0
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9050/realms/isec-insurance}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

aws:
  s3:
    bucket-name: ${S3_BUCKET:isecdocuments}
    region: ${AWS_REGION:us-east-1}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}

logging:
  level:
    com.isec.platform: INFO
    org.springframework.security: INFO

tenant:
  public-patterns:
    - "/actuator/**"
    - "/verify/**"
    - "/api/v1/rating/anonymous-quote"
    - "/api/v1/payments/callback"
    - "/api/v1/sms/delivery-report"
    - "/api/v1/profile"
branding:
  company:
    name: ${BRANDING_COMPANY_NAME:iSec Insurance Agency}
    address: ${BRANDING_COMPANY_ADDRESS:P.O. Box 12345-00100, Nairobi, Kenya}
    contacts: ${BRANDING_COMPANY_CONTACTS:+254 113 821287 | info@isecinsuranceagency.com}
    website: ${BRANDING_COMPANY_WEBSITE:www.isecinsuranceagency.com}
  logo-path: ${BRANDING_LOGO_PATH:classpath:/branding/isec_logo.png}
  signature-path: ${BRANDING_SIGNATURE_PATH:classpath:/branding/isec_signature.png}

mpesa:
  consumer-key: ${MPESA_CONSUMER_KEY}
  consumer-secret: ${MPESA_CONSUMER_SECRET}
  short-code: ${MPESA_SHORTCODE:174379}
  passkey: ${MPESA_PASSKEY}
  callback-url: ${MPESA_CALLBACK_URL}
  oauth-url: ${MPESA_OAUTH_URL:https://sandbox.safaricom.co.ke/oauth/v1/generate}
  stk-push-url: ${MPESA_STK_PUSH_URL:https://sandbox.safaricom.co.ke/mpesa/stkpush/v1/processrequest}
  stk-query-url: ${MPESA_STK_QUERY_URL:https://sandbox.safaricom.co.ke/mpesa/stkpushquery/v1/query}

documents:
  valuation-letter:
    validity-days: ${VALUATION_LETTER_VALIDITY_DAYS:14}

africastalking:
  username: ${AFRICASTALKING_USERNAME}
  api-key: ${AFRICASTALKING_API_KEY}
  from: ${AFRICASTALKING_FROM}
  base-url: ${AFRICASTALKING_BASE_URL:https://api.sandbox.africastalking.com}

rating:
  charges:
    pcf-rate: ${RATING_PCF_RATE:0.0025}
    itl-rate: ${RATING_ITL_RATE:0.0020}
    cert-charge: ${RATING_CERT_CHARGE:40.00}

ocr:
  debug:
    enabled: true
    file: "/Users/ericgitonganjue/Desktop/dev-workspace/isec-insurance-core-service/KDD454J-LogBook.pdf"
    documentType: NTSA_LOGBOOK #NTSA_SEARCH_RECORD
  storage:
    bucket: ${OCR_STORAGE_BUCKET:${S3_BUCKET:isecdocuments}}
    key-prefix: ${OCR_STORAGE_KEY_PREFIX:uploads/ocr}
    public-base-url: ${OCR_STORAGE_PUBLIC_BASE_URL:}
  tesseract:
    datapath: ${TESSDATA_PREFIX:modules/ocr/src/main/resources/tessdata}
    library-path: ${TESSERACT_LIBRARY_PATH:/opt/homebrew/opt/tesseract}
    language: ${OCR_TESSERACT_LANG:eng}

    page-seg-mode: ${OCR_TESSERACT_PSM:6}
    ocr-engine-mode: ${OCR_TESSERACT_OEM:1}
    preserve-interword-spaces: ${OCR_TESSERACT_PRESERVE_SPACES:true}
    user-defined-dpi: ${OCR_TESSERACT_DPI:300}
    char-whitelist: ${OCR_TESSERACT_WHITELIST:}
    char-blacklist: ${OCR_TESSERACT_BLACKLIST:}
  preprocess:
    enabled: ${OCR_PREPROCESS_ENABLED:true}
    deskew-enabled: ${OCR_PREPROCESS_DESKEW_ENABLED:true}
    scale-factor: ${OCR_PREPROCESS_SCALE_FACTOR:1.2}
    median-blur-kernel: ${OCR_PREPROCESS_MEDIAN_BLUR_KERNEL:3}
    adaptive-threshold: ${OCR_PREPROCESS_ADAPTIVE_THRESHOLD:true}
    adaptive-block-size: ${OCR_PREPROCESS_ADAPTIVE_BLOCK_SIZE:15}
    adaptive-c: ${OCR_PREPROCESS_ADAPTIVE_C:3.0}
    clahe-clip-limit: ${OCR_PREPROCESS_CLAHE_CLIP_LIMIT:2.0}
    clahe-tile-size: ${OCR_PREPROCESS_CLAHE_TILE_SIZE:8}
  processing:
    pdf-render-dpi: ${OCR_PDF_RENDER_DPI:300}
    max-pdf-pages: ${OCR_MAX_PDF_PAGES:3}
    store-diagnostics: ${OCR_STORE_DIAGNOSTICS:true}
    diagnostics-min-confidence: ${OCR_DIAGNOSTICS_MIN_CONFIDENCE:0.75}
    diagnostics-max-chars: ${OCR_DIAGNOSTICS_MAX_CHARS:8000}
server:
  port: ${SERVER_PORT:8080}
