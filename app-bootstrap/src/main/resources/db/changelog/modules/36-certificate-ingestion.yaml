databaseChangeLog:
  - changeSet:
      id: 20260406-36-certificate-ingestion
      author: junie
      changes:
        - addColumn:
            tableName: certificates
            columns:
              - column:
                  name: partner_code
                  type: VARCHAR(50)
              - column:
                  name: certificate_number
                  type: VARCHAR(100)
              - column:
                  name: policy_number
                  type: VARCHAR(100)
              - column:
                  name: vehicle_registration_number
                  type: VARCHAR(50)
              - column:
                  name: chassis_number
                  type: VARCHAR(100)
              - column:
                  name: customer_email
                  type: VARCHAR(255)
              - column:
                  name: s3_bucket
                  type: VARCHAR(255)
              - column:
                  name: s3_key
                  type: VARCHAR(500)
              - column:
                  name: file_name
                  type: VARCHAR(255)
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: content_type
                  type: VARCHAR(100)
              - column:
                  name: checksum
                  type: VARCHAR(255)
              - column:
                  name: ingestion_source
                  type: VARCHAR(50)
              - column:
                  name: email_message_id
                  type: VARCHAR(255)
              - column:
                  name: email_received_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP

        - createTable:
            tableName: certificate_ingestion_audit
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: email_message_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: sender
                  type: VARCHAR(255)
              - column:
                  name: subject
                  type: VARCHAR(500)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: failure_reason
                  type: TEXT
              - column:
                  name: retry_count
                  type: INT
                  defaultValueNumeric: 0
              - column:
                  name: certificate_id
                  type: BIGINT
              - column:
                  name: processed_at
                  type: TIMESTAMP
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
