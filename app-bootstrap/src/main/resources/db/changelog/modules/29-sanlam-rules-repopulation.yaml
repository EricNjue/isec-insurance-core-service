databaseChangeLog:
  - changeSet:
      id: 29-1
      author: junie
      comment: "Repopulate SANLAM rules after manual deletion"
      changes:
        - delete:
            tableName: rate_rules
            where: "tenant_id = 'SANLAM'"
        - delete:
            tableName: rate_rules
            where: "rate_book_id = 1"

        # 1. Eligibility Rules (Priority 1-3)
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "ELIGIBILITY"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Vehicle value must be between 500k and 15M"}
              - column: {name: priority, valueNumeric: 1}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() >= 500000 and vehicleValue.doubleValue() <= 15000000"}
              - column: {name: value_expression, value: "true"}
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "ELIGIBILITY"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Vehicles older than 20 years are not eligible"}
              - column: {name: priority, valueNumeric: 2}
              - column: {name: condition_expression, value: "vehicleAge <= 20"}
              - column: {name: value_expression, value: "true"}

        # 2. Base Premium - Threshold (Priority 4-5)
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "BASE_PREMIUM"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Basic premium for Private vehicles <= 600k"}
              - column: {name: priority, valueNumeric: 4}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() <= 600000"}
              - column: {name: value_expression, value: "37500"}
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "BASE_PREMIUM"}
              - column: {name: category, value: "COMMERCIAL"}
              - column: {name: description, value: "Basic premium for Commercial vehicles <= 600k"}
              - column: {name: priority, valueNumeric: 4}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() <= 600000"}
              - column: {name: value_expression, value: "37500"}

        # 3. Base Premium - Default (Priority 10)
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "BASE_PREMIUM"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Sanlam Private Car Default Base Rate (4%)"}
              - column: {name: priority, valueNumeric: 10}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() > 600000"}
              - column: {name: value_expression, value: "0.04"}
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "BASE_PREMIUM"}
              - column: {name: category, value: "COMMERCIAL"}
              - column: {name: description, value: "Sanlam Commercial Default Base Rate (6%)"}
              - column: {name: priority, valueNumeric: 10}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() > 600000"}
              - column: {name: value_expression, value: "0.06"}

        # 4. Minimum Premium (Priority 20)
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "MIN_PREMIUM"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Sanlam Private Car Min Premium"}
              - column: {name: priority, valueNumeric: 20}
              - column: {name: value_expression, value: "15000"}

        # 5. Add-ons - Threshold (Priority 25-27)
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "ADDON"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Excess Protector (Flat 5,000 for <= 600k)"}
              - column: {name: priority, valueNumeric: 25}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() <= 600000"}
              - column: {name: value_expression, value: "5000"}
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "ADDON"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "PVT (Flat 3,000 for <= 600k)"}
              - column: {name: priority, valueNumeric: 26}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() <= 600000"}
              - column: {name: value_expression, value: "3000"}

        # 6. Add-ons - Default (Priority 30-31)
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "ADDON"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Excess Protector (0.5% SI, Min 5,000)"}
              - column: {name: priority, valueNumeric: 30}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() > 600000"}
              - column: {name: value_expression, value: "T(java.lang.Math).max(5000.0, vehicleValue.doubleValue() * 0.005)"}
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "ADDON"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "PVT Cover (0.45% SI, Min 3,000)"}
              - column: {name: priority, valueNumeric: 31}
              - column: {name: condition_expression, value: "vehicleValue.doubleValue() > 600000"}
              - column: {name: value_expression, value: "T(java.lang.Math).max(3000.0, vehicleValue.doubleValue() * 0.0045)"}

        # 7. Courtesy Car (Universal)
        - insert:
            tableName: rate_rules
            columns:
              - column: {name: rate_book_id, valueNumeric: 1}
              - column: {name: tenant_id, value: "SANLAM"}
              - column: {name: rule_type, value: "ADDON"}
              - column: {name: category, value: "PRIVATE_CAR"}
              - column: {name: description, value: "Courtesy Car (3000 per 10 days)"}
              - column: {name: priority, valueNumeric: 35}
              - column: {name: condition_expression, value: "additionalData != null && additionalData['courtesyCarDays'] != null"}
              - column: {name: value_expression, value: "(T(java.lang.Integer).parseInt(additionalData['courtesyCarDays'].toString()) / 10) * 3000"}
